version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: islandnotes
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-supersecret_change_in_production}
    volumes:
      # Persist the SQLite database between container restarts
      - sqlite_data:/app/backend/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
    driver: local
